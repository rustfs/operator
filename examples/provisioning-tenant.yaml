# Tenant provisioning example
#
# Demonstrates operator-managed RustFS policy, user, and bucket provisioning.
# Demo credentials are intentionally simple; replace them with externally
# managed Secrets before using this pattern outside a test cluster.

apiVersion: v1
kind: Secret
metadata:
  name: provisioning-admin-creds
  namespace: default
type: Opaque
stringData:
  accesskey: admin123
  secretkey: admin12345

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: provisioning-app-policy
  namespace: default
  labels:
    rustfs.tenant: provisioning-demo
data:
  policy.json: |
    {
      "Version": "2012-10-17",
      "Statement": [
        {
          "Effect": "Allow",
          "Action": [
            "s3:ListBucket",
            "s3:GetObject",
            "s3:PutObject",
            "s3:DeleteObject"
          ],
          "Resource": [
            "arn:aws:s3:::provisioning-demo-data",
            "arn:aws:s3:::provisioning-demo-data/*"
          ]
        }
      ]
    }

---
apiVersion: v1
kind: Secret
metadata:
  name: provisioning-app-user
  namespace: default
  labels:
    rustfs.tenant: provisioning-demo
type: Opaque
stringData:
  accesskey: appuser01
  secretkey: appuser01secret

---
apiVersion: rustfs.com/v1alpha1
kind: Tenant
metadata:
  name: provisioning-demo
  namespace: default
spec:
  image: rustfs/rustfs:latest
  credsSecret:
    name: provisioning-admin-creds
  pools:
    - name: pool-0
      servers: 1
      persistence:
        volumesPerServer: 4

  policies:
    - name: app-readwrite
      document:
        configMapKeyRef:
          name: provisioning-app-policy
          key: policy.json

  users:
    - name: provisioning-app-user
      policies:
        - app-readwrite

  buckets:
    - name: provisioning-demo-data
      objectLock: true
