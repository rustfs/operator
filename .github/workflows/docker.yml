name: Publish Docker Image

on:
  workflow_run:
    workflows: [ "Build and Test" ]
    types: [ completed ]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version to publish, e.g. 1.0.0"
        required: true
        default: "1.0.0"
        type: string

permissions:
  contents: read
  packages: write

jobs:
  push-operator-images:
    runs-on: ubicloud-standard-2
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Normalize version
        id: version
        run: |
          set -eux
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            RAW="${{ github.event.workflow_run.head_branch }}"
          fi
          RAW_TAG="${RAW#refs/tags/}"
          VERSION="${RAW_TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to DockerHub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

            #      - name: Login to Quay.io
            #        uses: docker/login-action@v4
            #        with:
            #          registry: quay.io
            #          username: ${{ secrets.QUAY_USERNAME }}
            #          password: ${{ secrets.QUAY_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            rustfs/operator:latest
            rustfs/operator:${{ steps.version.outputs.version }}
            ghcr.io/${{ github.repository_owner }}/operator:latest
            ghcr.io/${{ github.repository_owner }}/operator:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
