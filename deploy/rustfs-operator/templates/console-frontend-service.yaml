{{- if and .Values.console.enabled .Values.console.frontend.enabled -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "rustfs-operator.fullname" . }}-console-frontend
  namespace: {{ include "rustfs-operator.namespace" . }}
  labels:
    {{- include "rustfs-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: console-frontend
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.console.frontend.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "rustfs-operator.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: console-frontend
{{- end }}
