{{- if .Values.console.enabled -}}
{{- $secretName := printf "%s-console-secret" (include "rustfs-operator.fullname" .) -}}
{{- $namespace := include "rustfs-operator.namespace" . -}}
{{- $existingSecret := lookup "v1" "Secret" $namespace $secretName -}}
{{- $jwtSecret := "" -}}
{{- if .Values.console.jwtSecret -}}
{{- $jwtSecret = (.Values.console.jwtSecret | b64enc) -}}
{{- else if and $existingSecret $existingSecret.data (hasKey $existingSecret.data "jwt-secret") -}}
{{- $jwtSecret = index $existingSecret.data "jwt-secret" -}}
{{- else -}}
{{- $jwtSecret = (randAlphaNum 32 | b64enc) -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ $namespace }}
  labels:
    {{- include "rustfs-operator.labels" . | nindent 4 }}
    app.kubernetes.io/component: console
type: Opaque
data:
  # Secret used to encrypt Console session cookies
  # Generate with: openssl rand -base64 32
  jwt-secret: {{ $jwtSecret | quote }}
{{- end }}
