{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "rustfs-operator.fullname" . }}
  labels:
    {{- include "rustfs-operator.labels" . | nindent 4 }}
rules:
  # Tenant resources
  - apiGroups: ["rustfs.com"]
    resources: ["tenants"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["rustfs.com"]
    resources: ["tenants/status"]
    verbs: ["update", "patch"]

  # Core resources managed by the operator
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "serviceaccounts", "pods", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]

  # Node status lookup (node down detection)
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch"]

  # RBAC resources created for tenants
  - apiGroups: ["rbac.authorization.k8s.io"]
    resources: ["roles", "rolebindings"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # StatefulSets for tenant pools
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

  # cert-manager Certificate orchestration and readiness watches
  - apiGroups: ["cert-manager.io"]
    resources: ["certificates"]
    verbs: ["get", "list", "watch", "create", "patch", "update"]
  - apiGroups: ["cert-manager.io"]
    resources: ["issuers", "clusterissuers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    resourceNames: ["certificates.cert-manager.io"]
    verbs: ["get"]

  # PersistentVolumeClaims - read (tenant-scoped event discovery lists PVC names)
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]

  # Events for reconciliation notifications and console event list (core + events.k8s.io)
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: ["events.k8s.io"]
    resources: ["events"]
    verbs: ["get", "list", "watch", "create", "patch"]
{{- end }}
