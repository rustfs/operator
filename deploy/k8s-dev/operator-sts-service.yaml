# Operator STS Service (used by dev/e2e deployment flows)
apiVersion: v1
kind: Service
metadata:
  name: rustfs-operator-sts
  namespace: rustfs-system
  labels:
    app.kubernetes.io/name: rustfs-operator
    app.kubernetes.io/component: operator
spec:
  type: ClusterIP
  ports:
    - port: 4223
      targetPort: sts
      protocol: TCP
      name: sts
  selector:
    app.kubernetes.io/name: rustfs-operator
    app.kubernetes.io/component: operator
