# Copyright 2025 RustFS Team
# Operator Deployment (used by the dev and e2e deployment flows)
# Image is replaced at runtime - use rustfs/operator:dev
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rustfs-operator
  namespace: rustfs-system
  labels:
    app.kubernetes.io/name: rustfs-operator
    app.kubernetes.io/component: operator
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: rustfs-operator
      app.kubernetes.io/component: operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: rustfs-operator
        app.kubernetes.io/component: operator
    spec:
      serviceAccountName: rustfs-operator
      containers:
        - name: operator
          image: rustfs/operator:dev
          imagePullPolicy: Never
          command: ["./operator", "server"]
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
            - name: sts
              containerPort: 4223
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /healthz
              port: metrics
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readyz
              port: metrics
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          env:
            - name: RUST_LOG
              value: info
            - name: OPERATOR_METRICS_ENABLED
              value: "true"
            - name: OPERATOR_METRICS_PORT
              value: "8080"
            - name: OPERATOR_TENANT_MONITOR_ENABLED
              value: "true"
            - name: OPERATOR_TENANT_MONITOR_INTERVAL_SECONDS
              value: "300"
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: OPERATOR_STS_ENABLED
              value: "true"
            - name: OPERATOR_STS_AUDIENCE
              value: sts.rustfs.com
            - name: OPERATOR_STS_PORT
              value: "4223"
            - name: OPERATOR_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: OPERATOR_STS_SERVICE_NAME
              value: rustfs-operator-sts
            - name: OPERATOR_STS_TLS_ENABLED
              value: "true"
            - name: OPERATOR_STS_TLS_AUTO
              value: "true"
