# Operator Console Service (used by the dev and e2e deployment flows)
apiVersion: v1
kind: Service
metadata:
  name: rustfs-operator-console
  namespace: rustfs-system
  labels:
    app.kubernetes.io/name: rustfs-operator-console
spec:
  type: ClusterIP
  ports:
    - port: 9090
      targetPort: http
      protocol: TCP
      name: http
  selector:
    app.kubernetes.io/name: rustfs-operator-console
